# VisionServeX bundled model registry.
#
# Honesty rules:
#   * License values reflect each upstream project's commonly-published
#     license at the time of writing. Always re-verify per-checkpoint and
#     per-dataset license before commercial use. See docs/model_licenses.md.
#   * `implementation_status` describes what THIS build does. `stub` means
#     no real inference; `wired` means the real backend runs when its
#     dependencies are installed; `partial` means rough edges remain.
#   * We make no benchmark superiority claims. Pick a model by task,
#     license, and resource footprint.

