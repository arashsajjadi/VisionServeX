name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs on the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Fast CI — runs on every push/PR with a single OS/Python combination.
# Target: < 5 minutes wall time.
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,server]" mypy
      - run: mypy src/visionservex || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit || true

  test-fast:
    name: Quick Tests (Python 3.12, ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,server]"
      - name: Run quick safe tests
        # Skips: real_model, gpu, network, sidecar, release, benchmark, disk_heavy, download
        run: |
          python -m pytest -q \
            -m "not slow and not real_model and not gpu and not network and not sidecar and not release and not benchmark and not memory and not disk_heavy and not download" \
            --tb=short --maxfail=5 --durations=20 --no-header \
            --ignore=tests/test_downloads.py \
            tests/
        env:
          VISIONSERVEX_ALLOW_CONCURRENT_PYTEST: "1"

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test-fast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# ---------------------------------------------------------------------------
# Full CI — runs on release tags and manual dispatch only.
# Matrix: 3 OS × 3 Python versions.
# ---------------------------------------------------------------------------
  test-full:
    name: Full Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,server,hf]"
      - name: Run full test suite
        run: pytest -ra --maxfail=5 --tb=short
        env:
          VISIONSERVEX_ALLOW_CONCURRENT_PYTEST: "1"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-fast]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: visionservex:ci
