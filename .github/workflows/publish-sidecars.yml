name: Publish Sidecar Images to GHCR

# Build and push the VisionServeX sidecar Docker images to the GitHub
# Container Registry. Triggered on release publication or manually.
#
# Images:
#   ghcr.io/<owner>/visionservex-openmmlab:<version>
#   ghcr.io/<owner>/visionservex-mmrotate-legacy:<version>
#   ghcr.io/<owner>/visionservex-maskdino:<version>
#
# Auth: Trusted Publishing (GITHUB_TOKEN with packages:write).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. v3.0.0)"
        required: true
        default: "v3.0.0"
      images:
        description: "Comma-separated list: openmmlab,mmrotate-legacy,maskdino"
        required: false
        default: "openmmlab,mmrotate-legacy,maskdino"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-openmmlab:
    name: Build and push OpenMMLab sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'workflow_dispatch' && (
        contains(github.event.inputs.images, 'openmmlab') ||
        github.event.inputs.images == ''
      ) ||
      github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/openmmlab/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/visionservex-openmmlab:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/visionservex-openmmlab:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.description=VisionServeX OpenMMLab expert sidecar (RTMPose/RTMDet)

  build-mmrotate-legacy:
    name: Build and push MMRotate legacy sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'workflow_dispatch' && (
        contains(github.event.inputs.images, 'mmrotate-legacy') ||
        github.event.inputs.images == ''
      ) ||
      github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mmrotate-legacy/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/visionservex-mmrotate-legacy:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/visionservex-mmrotate-legacy:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.description=VisionServeX MMRotate legacy sidecar (Oriented R-CNN, OBB)

  build-maskdino:
    name: Build and push MaskDINO sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'workflow_dispatch' && (
        contains(github.event.inputs.images, 'maskdino') ||
        github.event.inputs.images == ''
      ) ||
      github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/maskdino/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/visionservex-maskdino:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/visionservex-maskdino:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.description=VisionServeX MaskDINO Detectron2 sidecar
